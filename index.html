<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>夕暮れ — のけものがたり</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; min-height: 100%; background: #c4d5ff; }
      body {
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
        color: #003961;
      }
      /* Full-page layout (the game IS the page — no iframe). The portal's shared
         site header (injected as a sticky 60px <nav>; see vite.config) sits above
         and the game is centred below it. */
      #app { width: 100%; max-width: 640px; margin: 0 auto; padding: 18px 0 50px; }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <!-- メインサイト共通ヘッダー（本番で /js/common-header.js がこの <nav> を差し替え。
         スクリプトは vite.config の transformIndexHtml で注入される） -->
    <nav><!-- replaced by /js/common-header.js --></nav>
    <div id="app"></div>
  </body>
</html>
